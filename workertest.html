<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Worker Latency Test</title>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: sans-serif; padding: 20px; }
        button { background-color: #333; color: #e0e0e0; border: 1px solid #555; padding: 10px; cursor: pointer; }
        button:disabled { color: #888; background-color: #222; }
        #log { margin-top: 20px; white-space: pre-wrap; font-family: monospace; border-top: 1px solid #333; padding-top: 10px; }
    </style>
</head>
<body>
    <h1>SharedArrayBuffer Worker Latency Test</h1>
    <p><i>Note: Requires secure context (localhost/HTTPS) and COOP/COEP headers.</i></p>
    
    <button id="startBtn">Start Latency Test</button>
    <div id="log"></div>

    <script>
        const logDiv = document.getElementById('log');
        const startBtn = document.getElementById('startBtn');

        function log(msg) {
            logDiv.textContent += msg + '\n';
        }

        startBtn.addEventListener('click', async () => {
            startBtn.disabled = true;
            logDiv.textContent = ''; // Clear log
            log('Initializing Worker...');

            try {
                // Assumes worker.ts has been compiled to worker.js
                const worker = new Worker('worker.js');
                
                // Create 1KB SharedArrayBuffer (256 x 32-bit integers)
                const sab = new SharedArrayBuffer(1024);
                const int32View = new Int32Array(sab);
                
                // Setup message handling for the round-trip
                let resolver = null;
                worker.onmessage = (e) => {
                    const { type } = e.data;
                    if (type === 'READY') {
                        if (resolver) resolver();
                    }
                };

                // Send buffer to worker
                worker.postMessage({ type: 'INIT', payload: sab });
                
                // Wait for worker READY
                await new Promise(r => resolver = r);
                const iterations = 100000;
                log(`Worker Ready. Starting ${iterations} zero-copy round trips...`);

                const startTime = performance.now();

                for (let i = 0; i < iterations; i++) {
                    // 1. Main writes to shared memory (Index 1 is Data)
                    Atomics.store(int32View, 1, i);
                    
                    // 2. Signal worker (Index 0 is State: 0=Idle, 1=Active)
                    Atomics.store(int32View, 0, 1);
                    Atomics.notify(int32View, 0);
                    
                    // 3. Spin-wait for Worker response (Index 0 set back to 0)
                    while (Atomics.load(int32View, 0) !== 0) {
                        // Busy wait
                    }
                    
                    // 4. Verify Worker write (Index 1 should match loop i)
                    const returnedVal = Atomics.load(int32View, 1);
                    if (returnedVal !== i) throw new Error(`Mismatch! Expected ${i}, got ${returnedVal}`);
                }

                const totalTime = performance.now() - startTime;
                log(`Done. ${iterations} iterations.`);
                log(`Total Time: ${totalTime.toFixed(2)}ms`);
                log(`Avg Round Trip Latency: ${(totalTime / iterations).toFixed(3)}ms`);
                
                worker.terminate();
            } catch (err) {
                log('Error: ' + err.message);
                console.error(err);
            } finally {
                startBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
